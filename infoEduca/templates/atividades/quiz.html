{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'atividades:atividades_home' %}">Atividades</a></li>
            <li class="breadcrumb-item active">{{ atividade.titulo }}</li>
        </ol>
    </nav>

    <h3>📝 Quiz: {{ atividade.titulo }}</h3>
    <hr>

    <form method="POST">
        {% csrf_token %}
        {% for pergunta in perguntas %}
        <div class="card mb-4">
            <div class="card-header bg-light">
                <strong>Questão {{ forloop.counter }}</strong>
            </div>
            <div class="card-body">
                <p class="lead">{{ pergunta.enunciado }}</p>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="pergunta_{{ pergunta.id }}" value="A" id="q{{ pergunta.id }}a" required>
                    <label class="form-check-label" for="q{{ pergunta.id }}a">A) {{ pergunta.opcao_a }}</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="pergunta_{{ pergunta.id }}" value="B" id="q{{ pergunta.id }}b">
                    <label class="form-check-label" for="q{{ pergunta.id }}b">B) {{ pergunta.opcao_b }}</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="pergunta_{{ pergunta.id }}" value="C" id="q{{ pergunta.id }}c">
                    <label class="form-check-label" for="q{{ pergunta.id }}c">C) {{ pergunta.opcao_c }}</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="pergunta_{{ pergunta.id }}" value="D" id="q{{ pergunta.id }}d">
                    <label class="form-check-label" for="q{{ pergunta.id }}d">D) {{ pergunta.opcao_d }}</label>
                </div>
            </div>
        </div>
        {% endfor %}

        <div class="d-grid gap-2 mb-5">
            <button type="submit" class="btn btn-success btn-lg">Enviar Respostas</button>
        </div>
    </form>
</div>
{% endblock %}
