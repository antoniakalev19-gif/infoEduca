{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Selecione uma Disciplina</h2>
<div class="row">
    {% for disciplina in disciplinas %}
    <div class="col-md-4 mb-3">
        <div class="card h-100 shadow-sm border-primary">
            <div class="card-body text-center">
                <h3 class="card-title text-primary">{{ disciplina.nome }}</h3>
                <p class="card-text">{{ disciplina.descricao|truncatechars:100 }}</p>
                <a href="{% url 'disciplinas:detalhe_disciplina' disciplina.id %}" class="btn btn-primary">
                    Entrar na Sala
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
