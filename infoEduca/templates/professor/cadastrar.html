{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="bi bi-person-plus"></i> Cadastro de Professor</h3>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data" class="row g-3">
                {% csrf_token %}
                
                <!-- Nome -->
                <div class="col-md-6">
                    <label for="id_nome" class="form-label">Nome Completo</label>
                    <input type="text" name="nome" id="id_nome" class="form-control" placeholder="Digite o nome completo" required>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                    <label for="id_email" class="form-label">E-mail</label>
                    <input type="email" name="email" id="id_email" class="form-control" placeholder="exemplo@escola.com" required>
                </div>

                <!-- Escola -->
                <div class="col-md-6">
                    <label for="id_escola" class="form-label">Escola onde atua</label>
                    <input type="text" name="escola" id="id_escola" class="form-control" placeholder="Nome da escola" required>
                </div>

                <!-- Ano de Graduação -->
                <div class="col-md-6">
                    <label for="id_ano_graduacao" class="form-label">Ano de Graduação</label>
                    <input type="number" name="ano_graduacao" id="id_ano_graduacao" class="form-control" min="1950" max="2026" placeholder="Ex: 2015" required>
                </div>

                <!-- Upload de Foto -->
                <div class="col-md-6">
                    <label for="id_foto" class="form-label">Foto de Perfil</label>
                    <input type="file" name="foto" id="id_foto" class="form-control">
                </div>
                <!-- Especialidade -->
                <div class="col-md-6">
                    <label for="id_especialidade" class="form-label">Especialidade</label>
                    <input type="text" name="especialidade" id="id_especialidade" class="form-control" placeholder="Ex: Matemática, Ciências" required>
                </div>


                <!-- Área de Atuação -->
                <div class="col-md-6">
                    <label for="id_area" class="form-label">Área de Atuação</label>
                    <select name="area" id="id_area" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="Matemática">Matemática</option>
                        <option value="Português">Português</option>
                        <option value="Ciências">Ciências</option>
                        <option value="História">História</option>
                        <option value="Geografia">Geografia</option>
                        <option value="Educação Física">Educação Física</option>
                        <option value="Artes">Artes</option>
                        <option value="Libras">Libras</option>
                        <option value="Inglês">Inglês</option>
                        <option value="Outras disciplinas">Outras disciplinas</option>
                    </select>
                </div>

                <!-- Botão -->
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-circle"></i> Enviar Cadastro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
