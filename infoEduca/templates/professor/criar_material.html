{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cadastrar Novo Material</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Título do Material</label>
                            <input type="text" name="titulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Disciplina</label>
                            <select name="disciplina" class="form-select">
                                {% for d in disciplinas %}
                                <option value="{{ d.id }}">{{ d.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Texto de Estudo / Descrição</label>
                            <textarea name="descricao" class="form-control" rows="5"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Link de Vídeo (Opcional)</label>
                            <input type="url" name="link_video" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Arquivo PDF/Material (Opcional)</label>
                            <input type="file" name="arquivo" class="form-control">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'professor:dashboard' %}" class="btn btn-light">Cancelar</a>
                            <button type="submit" class="btn btn-success">Salvar Material</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
