{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2" style="color: #0a2540;">Bem-vindo</h3>
                    <p class="text-muted small">Acesse sua conta para continuar</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Usuário</label>
                        <input type="text" name="username" class="form-control" placeholder="Seu usuário" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Senha</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Entrar na Plataforma
                    </button>
                </form>
            </div>
            <!-- Link para recuperação de senha -->
            <div class="text-center mt-3">
            <a href="{% url 'reset_password' %}" class="small text-muted">Esqueci minha senha</a>
            </div>

            <div class=""card-footer bg-light text-center py-3 border-0">
                <small class="text-muted">
                 Dúvidas? <a href="{% url 'suporte' %}">Entre em contato pelo chat de suporte</a>. </small>

            </div>
        </div>
    </div>
</div>
{% endblock %}
