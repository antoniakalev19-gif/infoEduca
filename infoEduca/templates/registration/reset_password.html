{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-envelope-open text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2" style="color: #0a2540;">Recuperar Senha</h3>
                    <p class="text-muted small">Digite seu e-mail para receber o link de redefinição</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Enviar link de recuperação
                    </button>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0">
                <small class="text-muted">
                    <a href="{% url 'login' %}">Voltar para o login</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
